name: Build Windows (with Installer)

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.24.x

      - name: Setup Visual Studio 17 (2022) env for CMake compatibility
        shell: pwsh
        run: |
          $vsPath = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          Write-Host "VS path: $vsPath"
          & "$vsPath\Common7\Tools\VsDevCmd.bat" -arch=x64 -host_arch=x64 -no_logo
          Get-ChildItem env: | Where-Object {
            $_.Name -in @(
              'INCLUDE', 'LIB', 'LIBPATH', 'PATH',
              'WindowsSdkDir', 'WindowsSDKVersion',
              'UCRTVersion', 'UniversalCRTSdkDir',
              'VCToolsInstallDir', 'VCToolsVersion',
              'VSCMD_ARG_TGT_ARCH', 'VSCMD_ARG_HOST_ARCH'
            )
          } | ForEach-Object {
            echo "$($_.Name)=$($_.Value)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          echo "CMAKE_GENERATOR=Visual Studio 17 2022" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CMAKE_GENERATOR_PLATFORM=x64" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Read version from pubspec
        id: version
        shell: pwsh
        run: |
          $content = Get-Content pubspec.yaml -Raw
          if ($content -match 'version: (\S+)') {
            $ver = $Matches[1] -replace '\+.*', ''
            echo "version=$ver" >> $env:GITHUB_OUTPUT
          }

      - name: Add font config for Windows
        shell: pwsh
        run: |
          $pubspec = Get-Content pubspec.yaml -Raw
          if ($pubspec -notmatch "family: font") {
            $fontConfig = "`n  fonts:`n    - family: font`n      fonts:`n        - asset: fonts/NotoSansSC-Regular.ttf"
            Add-Content pubspec.yaml $fontConfig
          }

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows (Release)
        run: flutter build windows --release

      - name: Create ZIP package
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* `
                           -DestinationPath "build/windows/PicaComic-${{ steps.version.outputs.version }}-windows-x64.zip"

      - name: Setup Inno Setup
        run: |
          choco install innosetup --no-progress -y
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build installer
        shell: pwsh
        run: |
          $rootPath = (Get-Location).Path.Replace('\', '\\')
          $iss = Get-Content windows/build.iss -Raw
          $iss = $iss.Replace('{{version}}', '${{ steps.version.outputs.version }}')
          $iss = $iss.Replace('{{root_path}}', $rootPath)
          Set-Content windows/build_temp.iss -Value $iss
          iscc windows/build_temp.iss

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: PicaComic-ZIP
          path: build/windows/PicaComic-*.zip

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: PicaComic-Installer
          path: build/windows/PicaComic-*-windows-installer.exe
